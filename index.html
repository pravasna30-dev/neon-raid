<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON RAID v2.0</title>
<meta name="description" content="NEON RAID v2.0 — neon-retro browser tribute to the 1982 river shooter. Fruits, bank tankers, progressive sectors.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🚀</text></svg>">
<style>
  :root{--cyan:#00ffff;--magenta:#ff00ff;--gold:#ffe000;--lime:#00ff88;--orange:#ff6600;--bg:#03010e}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:'Courier New',monospace;
    user-select:none;-webkit-user-select:none;touch-action:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 25%,#0d0530 0%,#03010e 70%)}
  canvas{display:block;border-radius:4px;
    box-shadow:0 0 80px rgba(0,255,255,.25),0 0 160px rgba(255,0,255,.12),0 0 4px #000}
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:10}
  .panel{background:rgba(6,2,22,.96);border:1px solid rgba(0,255,255,.6);border-radius:14px;
    padding:30px 38px;color:#d8f8ff;text-align:center;max-width:92vw;
    box-shadow:0 0 50px rgba(0,255,255,.3),inset 0 0 40px rgba(0,255,255,.05)}
  .panel h2{color:var(--cyan);letter-spacing:5px;margin-bottom:18px;text-shadow:0 0 18px var(--cyan),0 0 40px var(--cyan)}
  .panel input{background:#080318;border:1px solid var(--magenta);color:#fff;font-family:inherit;
    font-size:22px;padding:11px 16px;border-radius:8px;text-align:center;letter-spacing:3px;
    text-transform:uppercase;width:260px;outline:none;box-shadow:0 0 18px rgba(255,0,255,.4)}
  .panel button{margin-top:20px;background:linear-gradient(135deg,#ff00ff,#7700ff);border:none;
    color:#fff;font-family:inherit;font-size:16px;letter-spacing:3px;padding:13px 30px;
    border-radius:8px;cursor:pointer;box-shadow:0 0 22px rgba(255,0,255,.6)}
  .panel button:active{transform:scale(.96)}
  table{margin:12px auto;border-collapse:collapse;min-width:320px}
  td,th{padding:7px 16px;font-size:15px;letter-spacing:1px}
  th{color:var(--magenta);text-shadow:0 0 10px var(--magenta);border-bottom:1px solid rgba(255,0,255,.45)}
  tr.me td{color:var(--gold);text-shadow:0 0 10px var(--gold)}
  td:first-child{color:var(--cyan)}
  #muteBtn{position:fixed;top:10px;right:12px;z-index:20;background:rgba(6,2,22,.8);
    border:1px solid rgba(0,255,255,.5);color:var(--cyan);border-radius:8px;padding:7px 13px;
    font-family:inherit;font-size:14px;cursor:pointer;text-shadow:0 0 8px var(--cyan)}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<button id="muteBtn" title="Toggle sound (M)">&#9836; ON</button>

<div class="overlay" id="nameOverlay">
  <div class="panel">
    <h2>NEW LEGEND</h2>
    <p style="margin-bottom:16px">Score <span id="finalScore" style="color:var(--gold);text-shadow:0 0 12px var(--gold)"></span></p>
    <p style="margin-bottom:14px;font-size:13px;opacity:.8">Enter your call sign, pilot</p>
    <input id="nameInput" maxlength="10" placeholder="ACE" autocomplete="off">
    <br><button id="saveScore">ENGRAVE IT</button>
  </div>
</div>

<div class="overlay" id="boardOverlay">
  <div class="panel">
    <h2>HALL OF LEGENDS</h2>
    <div id="boardRows"></div>
    <button id="closeBoard" style="margin-top:16px">BACK TO RAID</button>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   NEON RAID v2.0
   - 720px wide canvas, doubled river width
   - Vivid neon palette with heavy glow
   - Fruit flyovers: cherry/orange/lemon/berry/grape/melon/star
   - Bank tankers: shoot at player from river banks, multi-hit
   - Enemy bullets from tankers (sector 2+) and helis (sector 3+)
   - Progressive wave difficulty: harder per sector + sine-wave breathing
   - Version badge visible in HUD and game-over
   ===================================================================== */

const W = 720, H = 760, VERSION = 'v2.1';

/* difficulty presets — all difficulty-sensitive params live here */
const DIFF_PRESETS = [
  {
    key:'easy',   label:'EASY',   sub:'take it easy',
    col:'#00ff88', dimCol:'#00774a',
    diffRate:0.06,   // how fast sectorN scales up difficulty
    spawnBase:280,   // base ms between spawns
    waveAmp:22,      // how much the wave oscillation pushes spawn density
    fuelDrain:1.4,   // fuel/sec multiplier
    tankerSect:4,    // sector tankers first appear
    heliFireSect:6,  // sector helis start shooting
    jetSect:4,       // sector jets first appear
    scoreBonus:1.0,  // score multiplier
    tip:'Slow progression · Gentle enemies · Classic fun',
  },
  {
    key:'medium', label:'MEDIUM', sub:'the real raid',
    col:'#ffe000', dimCol:'#7a6a00',
    diffRate:0.14,
    spawnBase:200,
    waveAmp:55,
    fuelDrain:2.0,
    tankerSect:2,
    heliFireSect:3,
    jetSect:2,
    scoreBonus:1.5,
    tip:'Classic challenge · Balanced · Score ×1.5',
  },
  {
    key:'hard',   label:'HARD',   sub:'no mercy',
    col:'#ff2244', dimCol:'#7a0022',
    diffRate:0.22,
    spawnBase:140,
    waveAmp:78,
    fuelDrain:2.7,
    tankerSect:1,
    heliFireSect:2,
    jetSect:1,
    scoreBonus:2.0,
    tip:'Relentless · Fast enemies · Score ×2',
  },
];
let activePreset = DIFF_PRESETS[1]; // default medium
const SECTOR   = 3800;
const BRIDGE_W = 520;
const PLAYER_Y = H - 130;

/* canvas */
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 3);
  const s = Math.min(window.innerWidth/W, window.innerHeight/H) * 0.988;
  canvas.style.width  = (W*s)+'px';
  canvas.style.height = (H*s)+'px';
  canvas.width  = Math.round(W*DPR);
  canvas.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* fruit definitions */
const FRUIT_DEFS = [
  { label:'CHERRY', emoji:'🍒', pts:  50, col:'#ff2244', r:13 },
  { label:'ORANGE', emoji:'🍊', pts: 100, col:'#ff7700', r:14 },
  { label:'LEMON',  emoji:'🍋', pts: 150, col:'#ffee00', r:13 },
  { label:'BERRY',  emoji:'🍓', pts: 200, col:'#ff1166', r:12 },
  { label:'GRAPE',  emoji:'🍇', pts: 300, col:'#cc00ff', r:12 },
  { label:'MELON',  emoji:'🍉', pts: 500, col:'#00ff66', r:15 },
  { label:'STAR',   emoji:'⭐',       pts:1000, col:'#ffe000', r:16 },
];

/* ── WebAudio synth ── */
const SFX = {
  ac:null, master:null, muted:false, engineOsc:null, engineGain:null,
  init(){
    if(this.ac) return;
    try{
      this.ac = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ac.createGain(); this.master.gain.value = 0.5;
      this.master.connect(this.ac.destination);
    }catch(e){ this.ac=null; }
  },
  resume(){ if(this.ac&&this.ac.state==='suspended') this.ac.resume(); },
  env(type,f0,f1,dur,vol,when=0){
    if(!this.ac||this.muted) return;
    const t=this.ac.currentTime+when;
    const o=this.ac.createOscillator(), g=this.ac.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.05);
  },
  noise(dur,vol,fc){
    if(!this.ac||this.muted) return;
    const t=this.ac.currentTime, len=Math.floor(this.ac.sampleRate*dur);
    const buf=this.ac.createBuffer(1,len,this.ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=this.ac.createBufferSource(); src.buffer=buf;
    const f=this.ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=fc;
    const g=this.ac.createGain(); g.gain.value=vol;
    src.connect(f); f.connect(g); g.connect(this.master); src.start(t);
  },
  shoot(){ this.env('square',1020,180,0.10,0.13); },
  boom(){ this.noise(0.4,0.45,1100); this.env('sine',160,28,0.4,0.38); },
  bigBoom(){ this.noise(0.85,0.65,700); this.env('sine',110,22,0.85,0.52); },
  fuelTick(){ this.env('sine',600,760,0.06,0.07); },
  fruitPop(){ this.env('triangle',880,1320,0.05,0.14); this.env('triangle',1100,1760,0.05,0.14,0.04); },
  tankerShot(){ this.env('sawtooth',200,70,0.14,0.09); },
  warn(){ this.env('square',240,240,0.09,0.11); },
  sectorFanfare(){ [523,659,784,1047,1319].forEach((f,i)=>this.env('triangle',f,f,0.16,0.20,i*0.08)); },
  gameOver(){ [392,330,262,196,130].forEach((f,i)=>this.env('sawtooth',f,f*0.96,0.28,0.18,i*0.21)); },
  godModeStart(){
    if(!this.ac||this.muted) return;
    [330,415,523,659,831,1047,1319,1047,784,523].forEach((f,i)=>{
      this.env('triangle',f,f+18,0.22,0.22,i*0.26);
      this.env('sine',f*2,f*2,0.12,0.07,i*0.26+0.06);
    });
    this.env('sine',1400,1400,2.4,0.06,0.5);
  },
  godModeEnd(){
    if(!this.ac||this.muted) return;
    [1047,784,523,330,220].forEach((f,i)=>this.env('sawtooth',f,f*0.72,0.24,0.16,i*0.12));
    this.noise(0.36,0.28,900);
  },
  bumperPop(){ this.env('sine',280,560,0.10,0.14); },
  engineStart(){
    if(!this.ac||this.engineOsc) return;
    this.engineOsc=this.ac.createOscillator();
    this.engineGain=this.ac.createGain();
    this.engineOsc.type='sawtooth';
    this.engineOsc.frequency.value=50;
    this.engineGain.gain.value=0;
    this.engineOsc.connect(this.engineGain);
    this.engineGain.connect(this.master);
    this.engineOsc.start();
  },
  engineSet(r){
    if(!this.engineGain) return;
    this.engineGain.gain.value=this.muted?0:0.016+r*0.022;
    this.engineOsc.frequency.value=40+r*62;
  },
  engineStop(){
    if(this.engineOsc){ try{this.engineOsc.stop();}catch(e){} this.engineOsc=null; this.engineGain=null; }
  }
};
const muteBtn=document.getElementById('muteBtn');
function toggleMute(){ SFX.muted=!SFX.muted; muteBtn.textContent=(SFX.muted?'♪ OFF':'♪ ON'); }
muteBtn.addEventListener('click',e=>{ e.stopPropagation(); toggleMute(); });

/* ── persistence — separate leaderboard per difficulty mode ── */
const LS_KEYS={
  easy:  'neonRaidV2_easy',
  medium:'neonRaidV2_medium',
  hard:  'neonRaidV2_hard',
};
function loadLegendsFor(k){
  try{ return JSON.parse(localStorage.getItem(LS_KEYS[k]))||[]; }catch(e){ return []; }
}
function saveLegendsFor(k,list){
  try{ localStorage.setItem(LS_KEYS[k],JSON.stringify(list)); }catch(e){}
}
// best score in the currently active mode
function hiScore(){
  const l=loadLegendsFor(activePreset.key);
  return l.length?l[0].score:0;
}
// overall top score across all modes (for title screen)
function getTopLegend(){
  let top=null;
  DIFF_PRESETS.forEach(p=>{
    const l=loadLegendsFor(p.key);
    if(l.length&&(!top||l[0].score>top.score)) top={...l[0],modeLabel:p.label,modeCol:p.col};
  });
  return top;
}

/* ── river geometry (DOUBLED width in wider canvas) ── */
function riverAt(wy){
  const sector=Math.floor(wy/SECTOR);
  const local=wy-sector*SECTOR;
  const near=Math.min(local,SECTOR-local);
  const f=Math.min(1,Math.max(0,(near-60)/340));
  const wander=(
    Math.sin(wy*0.0010)*0.55+
    Math.sin(wy*0.0022+1.8)*0.32+
    Math.sin(wy*0.0005+3.9)*0.48
  )*145;
  let width=430+Math.sin(wy*0.0017+2.0)*120+Math.sin(wy*0.0008)*85;
  width-=Math.min(140,sector*12);
  width=Math.max(220,Math.min(590,width));
  let center=W/2+f*wander;
  width=BRIDGE_W+(width-BRIDGE_W)*f;
  const half=width/2;
  center=Math.max(65+half,Math.min(W-65-half,center));
  return {l:center-half,r:center+half};
}

/* ── helpers ── */
function rnd(a,b){ return a+Math.random()*(b-a); }
function roundRect(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);     ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* ── game state ── */
const ST={TITLE:0,PLAYING:1,DYING:2,GAMEOVER:3,SELECT:4};
let state,camY,spawnWy,nextBridgeK;
let score,lives,sectorN,fuel;
let player,bullets,enemies,enemyBullets,particles,popups,rings;
let shake,dieTimer,invuln,fireCd,banner,lowFuelBeep;
let jetTimer,fruitTimer,paused,tPrev=0,titleT=0,godMode=0;

function newPlayer(){ return {x:W/2,vx:0,speed:250,w:32,h:40}; }
function resetRun(){
  camY=220; spawnWy=camY; nextBridgeK=1;
  score=0; lives=3; sectorN=1; fuel=100;
  player=newPlayer();
  bullets=[]; enemies=[]; enemyBullets=[]; particles=[]; popups=[]; rings=[];
  shake=0; invuln=2; fireCd=0; banner=null; lowFuelBeep=0; godMode=0;
  jetTimer=5; fruitTimer=rnd(8,16);
  paused=false;
  seedAhead();
}

/* ── difficulty ── */
function diffScale(){
  return Math.min(1,(sectorN-1)*activePreset.diffRate);
}
function waveIntensity(){ return 0.5+0.5*Math.sin(camY*0.00042+sectorN*2.1); }
function spawnGap(){
  const base=Math.max(70,activePreset.spawnBase-sectorN*18);
  const wave=waveIntensity()*activePreset.waveAmp;
  return Math.max(50,base-wave);
}

/* ── seeding ── */
function seedAhead(){ while(spawnWy<camY+H+300) advanceSpawner(); }
function advanceSpawner(){
  spawnWy+=spawnGap();
  const rv=riverAt(spawnWy);
  if(spawnWy>=nextBridgeK*SECTOR){
    enemies.push({type:'bridge',wy:nextBridgeK*SECTOR,hp:1,hit:0});
    nextBridgeK++;
    return;
  }
  const local=spawnWy%SECTOR;
  if(Math.min(local,SECTOR-local)<380) return;
  const margin=38;
  const riverW=rv.r-rv.l;
  if(riverW<margin*2+50) return;
  const diff=diffScale(), wave=waveIntensity();
  const x=rnd(rv.l+margin,rv.r-margin);
  const r=Math.random();
  if(r<0.13){
    enemies.push(Math.random()<0.14&&sectorN>=2
      ?{type:'godFuel',wy:spawnWy,x,w:32,h:58}
      :{type:'fuel',wy:spawnWy,x,w:32,h:58});
    return;
  }
  if(r<0.13+0.27+diff*0.10){
    const spd=rnd(55,100+70*diff)*(1+wave*0.4);
    enemies.push({type:'heli',wy:spawnWy,x,w:46,h:24,
      vx:(Math.random()<.5?-1:1)*spd,rotor:Math.random()*7,
      fireTimer:sectorN>=activePreset.heliFireSect?rnd(3,6):Infinity});
    return;
  }
  if(r<0.13+0.27+0.25+diff*0.12){
    enemies.push({type:'ship',wy:spawnWy,x,w:58,h:20,
      vx:(Math.random()<.5?-1:1)*rnd(18,40+28*diff)});
    return;
  }
  // bank tankers
  if(sectorN>=activePreset.tankerSect){
    const leftW=rv.l, rightW=W-rv.r;
    const tankerHp=1+Math.min(3,Math.floor(diff*2.5));
    const tankerVal=120+sectorN*40;
    const fireBase=Math.max(1.2,4.0-sectorN*0.38);
    if(leftW>65&&Math.random()<0.18+diff*0.14+wave*0.10){
      enemies.push({type:'tanker',wy:spawnWy,x:rnd(28,rv.l-32),side:'left',
        w:54,h:26,hp:tankerHp,maxHp:tankerHp,
        fireTimer:rnd(fireBase*0.6,fireBase*1.4),val:tankerVal,hit:0});
    }
    if(rightW>65&&Math.random()<0.18+diff*0.14+wave*0.10){
      enemies.push({type:'tanker',wy:spawnWy,x:rnd(rv.r+32,W-28),side:'right',
        w:54,h:26,hp:tankerHp,maxHp:tankerHp,
        fireTimer:rnd(fireBase*0.6,fireBase*1.4),val:tankerVal,hit:0});
    }
  }
  /* rubber bumpers on sharp river bends */
  const rvA=riverAt(spawnWy+110),rvB=riverAt(spawnWy-110);
  const leftRate=rvA.l-rvB.l, rightRate=rvB.r-rvA.r;
  if(leftRate>18&&rv.l>28&&Math.random()<0.55)
    enemies.push({type:'bumper',wy:spawnWy,side:'left',x:rv.l,r:14,bounceT:0});
  if(rightRate>18&&W-rv.r>28&&Math.random()<0.55)
    enemies.push({type:'bumper',wy:spawnWy,side:'right',x:rv.r,r:14,bounceT:0});
}

function maybeSpawnJet(dt){
  if(sectorN<activePreset.jetSect) return;
  jetTimer-=dt;
  if(jetTimer<=0){
    jetTimer=Math.max(2.5,rnd(4,10)-sectorN*0.5);
    const left=Math.random()<0.5;
    const sy=rnd(100,340);
    enemies.push({type:'jet',wy:camY+(PLAYER_Y-sy),x:left?-45:W+45,
      vx:(left?1:-1)*rnd(260,380+sectorN*25),w:42,h:16});
  }
}
function maybeSpawnFruit(dt){
  fruitTimer-=dt;
  if(fruitTimer<=0){
    fruitTimer=Math.max(3.5,rnd(9,18)-sectorN*1.1);
    const maxIdx=Math.min(FRUIT_DEFS.length-1,1+Math.floor(sectorN*0.9));
    const weights=FRUIT_DEFS.map((_,i)=>i<=maxIdx?Math.pow(0.55,i)*30:0);
    const total=weights.reduce((a,b)=>a+b,0);
    let pick=Math.random()*total, fi=0;
    for(let i=0;i<weights.length;i++){ pick-=weights[i]; if(pick<=0){fi=i;break;} }
    const fd=FRUIT_DEFS[fi];
    const left=Math.random()<0.5;
    const sy=rnd(80,H-220);
    const spd=rnd(130,210+sectorN*22);
    enemies.push({type:'fruit',wy:camY+(PLAYER_Y-sy),x:left?-38:W+38,
      vx:(left?1:-1)*spd,w:32,h:32,fd,spin:0});
  }
}

/* ── fx helpers ── */
function explode(x,y,col,n=28,big=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=rnd(45,big?380:260);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(.3,.8),t:0,col,size:rnd(1.5,big?5:3.5)});
  }
  rings.push({x,y,r:5,vr:big?460:320,life:.5,t:0,col});
  shake=Math.min(16,shake+(big?13:7));
}
function popup(x,y,txt,col){ popups.push({x,y,txt,col,t:0,life:0.95}); }
function addScore(v,x,y,col){
  const pts=Math.round(v*activePreset.scoreBonus);
  score+=pts;
  popup(x,y,'+'+pts,col);
}

/* ── input ── */
const keys={};
window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()]=true;
  if(e.key==='m'||e.key==='M') toggleMute();
  if((e.key==='p'||e.key==='P')&&state===ST.PLAYING) paused=!paused;
  if(state===ST.TITLE&&(e.key==='Enter'||e.key===' ')) openSelect();
  if(state===ST.SELECT){
    if(e.key==='1') startGame(0);
    if(e.key==='2') startGame(1);
    if(e.key==='3') startGame(2);
    if(e.key==='Escape') state=ST.TITLE;
  }
  if(state===ST.GAMEOVER&&e.key==='Enter'&&!overlayOpen()) openSelect();
  if((e.key==='r'||e.key==='R')&&!overlayOpen()&&state!==ST.TITLE) openSelect();
  if((e.key==='q'||e.key==='Q')&&!overlayOpen()){SFX.engineStop();godMode=0;state=ST.TITLE;}
  if((e.key==='l'||e.key==='L')&&state!==ST.PLAYING) showBoard(activePreset.key);
});
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
let touch={active:false,x:W/2,y:PLAYER_Y,fire:false};
canvas.addEventListener('pointerdown',e=>{
  SFX.init(); SFX.resume();
  const p=toGame(e);
  if(state===ST.TITLE){openSelect();return;}
  if(state===ST.GAMEOVER&&!overlayOpen()){openSelect();return;}
  if(state===ST.SELECT){
    // card tap detection: 3 cards centred at W/6, W/2, W*5/6, height 200-540
    if(p.y>195&&p.y<545){
      const idx=Math.floor(p.x/(W/3));
      if(idx>=0&&idx<=2) startGame(idx);
    }
    return;
  }
  touch.active=true; touch.fire=true; touch.x=p.x; touch.y=p.y;
});
canvas.addEventListener('pointermove',e=>{ if(!touch.active) return; const p=toGame(e); touch.x=p.x; touch.y=p.y; });
window.addEventListener('pointerup',()=>{ touch.active=false; touch.fire=false; });
function toGame(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H}; }
function overlayOpen(){ return nameOverlay.style.display==='flex'||boardOverlay.style.display==='flex'; }
document.addEventListener('visibilitychange',()=>{ if(document.hidden&&state===ST.PLAYING) paused=true; });

/* ── overlays ── */
const nameOverlay=document.getElementById('nameOverlay');
const boardOverlay=document.getElementById('boardOverlay');
const nameInput=document.getElementById('nameInput');
document.getElementById('saveScore').addEventListener('click',commitScore);
nameInput.addEventListener('keydown',e=>{ if(e.key==='Enter') commitScore(); e.stopPropagation(); });
document.getElementById('closeBoard').addEventListener('click',()=>{ boardOverlay.style.display='none'; });
function commitScore(){
  const name=(nameInput.value.trim()||'ACE').toUpperCase().slice(0,10);
  let list=loadLegendsFor(activePreset.key);
  list.push({name,score,sector:sectorN,date:new Date().toISOString().slice(0,10)});
  list.sort((a,b)=>b.score-a.score); list=list.slice(0,10);
  saveLegendsFor(activePreset.key,list);
  nameOverlay.style.display='none';
  showBoard(activePreset.key,name,score);
}

/* tab state for the leaderboard overlay */
let boardViewKey='medium';
let _boardHlName=null, _boardHlScore=null;

function showBoard(viewKey,hlName,hlScore){
  boardViewKey=viewKey||activePreset.key;
  _boardHlName=hlName||null; _boardHlScore=hlScore||null;
  _renderBoard();
  boardOverlay.style.display='flex';
}
/* called from inline onclick on tab buttons */
function switchBoardTab(k){
  boardViewKey=k;
  // only keep highlight if it belongs to this tab
  if(k!==activePreset.key){ _boardHlName=null; _boardHlScore=null; }
  _renderBoard();
}
function _renderBoard(){
  const el=document.getElementById('boardRows');
  // tab buttons
  let h='<div style="display:flex;gap:8px;justify-content:center;margin-bottom:18px">';
  DIFF_PRESETS.forEach(p=>{
    const on=p.key===boardViewKey;
    h+=`<button onclick="switchBoardTab('${p.key}')" style="
      background:${on?p.col+'28':'transparent'};
      border:1.5px solid ${on?p.col:'rgba(255,255,255,0.18)'};
      color:${on?p.col:'rgba(255,255,255,0.45)'};
      font-family:'Courier New',monospace;font-size:13px;letter-spacing:3px;
      padding:7px 18px;border-radius:7px;cursor:pointer;
      box-shadow:${on?'0 0 14px '+p.col+'88':'none'};
      text-shadow:${on?'0 0 8px '+p.col:'none'}">${p.label}</button>`;
  });
  h+='</div>';
  const list=loadLegendsFor(boardViewKey);
  const preset=DIFF_PRESETS.find(p=>p.key===boardViewKey);
  // mode description line
  h+=`<p style="font-size:12px;opacity:.55;margin-bottom:10px;letter-spacing:1px">${preset.tip}</p>`;
  if(!list.length){
    h+='<p style="padding:18px 8px;opacity:.55;font-size:13px">No legends yet in this mode.<br>Be the first to carve your name.</p>';
  } else {
    h+='<table><tr><th>#</th><th>PILOT</th><th>SCORE</th><th>SECTOR</th><th>DATE</th></tr>';
    list.forEach((l,i)=>{
      const isMe=(_boardHlName&&l.name===_boardHlName&&l.score===_boardHlScore&&boardViewKey===activePreset.key);
      h+=`<tr${isMe?' class="me"':''}><td>${i+1}</td><td>${l.name}</td><td>${l.score.toLocaleString()}</td><td>${l.sector}</td><td style="opacity:.5;font-size:11px">${l.date||''}</td></tr>`;
    });
    h+='</table>';
  }
  el.innerHTML=h;
}

/* ── flow ── */
function openSelect(){
  SFX.init(); SFX.resume();
  nameOverlay.style.display='none'; boardOverlay.style.display='none';
  state=ST.SELECT;
}
function startGame(presetIdx){
  activePreset=DIFF_PRESETS[presetIdx!=null?presetIdx:1];
  SFX.engineStart();
  resetRun(); state=ST.PLAYING;
}
function loseLife(){
  SFX.bigBoom();
  explode(player.x,PLAYER_Y,'#00ffff',40,true);
  explode(player.x,PLAYER_Y,'#ff00ff',24,true);
  lives--; state=ST.DYING; dieTimer=1.4;
}
function respawnOrEnd(){
  if(lives<=0){
    state=ST.GAMEOVER; SFX.engineSet(0); SFX.gameOver();
    const _l=loadLegendsFor(activePreset.key);
    if(score>0&&(_l.length<10||score>_l[_l.length-1].score)){
      document.getElementById('finalScore').textContent=score.toLocaleString();
      nameInput.value=''; nameOverlay.style.display='flex';
      setTimeout(()=>nameInput.focus(),60);
    }
    return;
  }
  const mid=(riverAt(camY).l+riverAt(camY).r)/2;
  player=newPlayer(); player.x=mid;
  fuel=100; invuln=2.8;
  enemies=enemies.filter(e=>{
    if(e.type==='bridge'||e.type==='fuel'||e.type==='fruit') return true;
    const sy=PLAYER_Y-(e.wy-camY);
    return sy<-80||sy>H+80;
  });
  enemyBullets=[];
  state=ST.PLAYING;
}

/* ── update ── */
function update(dt){
  titleT+=dt;
  if(state===ST.TITLE||state===ST.GAMEOVER||state===ST.SELECT){
    camY+=65*dt; seedAhead(); updateFx(dt); return;
  }
  if(state===ST.DYING){
    dieTimer-=dt; updateFx(dt); SFX.engineSet(0);
    if(dieTimer<=0) respawnOrEnd();
    return;
  }
  if(paused) return;

  /* controls */
  const left=keys['arrowleft']||keys['a'];
  const right=keys['arrowright']||keys['d'];
  const up=keys['arrowup']||keys['w'];
  const down=keys['arrowdown']||keys['s'];
  const fire=keys[' ']||keys['x']||touch.fire;

  const ACC=1500,MAXVX=380;
  if(left)  player.vx-=ACC*dt;
  if(right) player.vx+=ACC*dt;
  if(!left&&!right) player.vx*=Math.pow(0.00005,dt);
  if(touch.active){ const dx=touch.x-player.x; player.vx=Math.max(-MAXVX,Math.min(MAXVX,dx*10)); }
  player.vx=Math.max(-MAXVX,Math.min(MAXVX,player.vx));
  player.x+=player.vx*dt;
  player.x=Math.max(16,Math.min(W-16,player.x));

  const SPD_MIN=120,SPD_MAX=480,SPD_DEF=250;
  let targetSpd=SPD_DEF;
  if(up) targetSpd=SPD_MAX;
  if(down) targetSpd=SPD_MIN;
  if(touch.active){
    if(touch.y<PLAYER_Y-170) targetSpd=SPD_MAX;
    else if(touch.y>PLAYER_Y+50) targetSpd=SPD_MIN;
  }
  player.speed+=(targetSpd-player.speed)*Math.min(1,dt*3.2);
  SFX.engineSet((player.speed-SPD_MIN)/(SPD_MAX-SPD_MIN));
  camY+=player.speed*dt;
  seedAhead();
  maybeSpawnJet(dt);
  maybeSpawnFruit(dt);

  /* fuel */
  fuel-=dt*activePreset.fuelDrain*(player.speed/SPD_DEF);
  if(fuel<28){ lowFuelBeep-=dt; if(lowFuelBeep<=0){SFX.warn();lowFuelBeep=0.52;} }
  if(fuel<=0){ fuel=0; loseLife(); return; }

  /* god mode countdown */
  if(godMode>0){ godMode-=dt; if(godMode<=0){godMode=0;SFX.godModeEnd();} }

  /* player bullets */
  fireCd-=dt;
  if(fire&&fireCd<=0){
    fireCd=0.16;
    bullets.push({x:player.x,sy:PLAYER_Y-30,r:3.5});
    SFX.shoot();
    particles.push({x:player.x,y:PLAYER_Y-28,vx:rnd(-22,22),vy:-90,life:.14,t:0,col:'#88ffff',size:2.5});
  }
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; b.sy-=820*dt;
    if(b.sy<-28){bullets.splice(i,1);continue;}
    const wy=camY+(PLAYER_Y-b.sy);
    const rv=riverAt(wy);
    if(b.x<rv.l+2||b.x>rv.r-2){
      particles.push({x:b.x,y:b.sy,vx:0,vy:0,life:.18,t:0,col:'#00ffff',size:2.5});
      bullets.splice(i,1);
    }
  }

  /* enemy bullets */
  for(let i=enemyBullets.length-1;i>=0;i--){
    const b=enemyBullets[i];
    b.x+=b.vx*dt; b.wy+=b.vwy*dt;
    const bsy=PLAYER_Y-(b.wy-camY);
    if(bsy>H+70||bsy<-130||b.x<-40||b.x>W+40){enemyBullets.splice(i,1);continue;}
    if(invuln<=0&&Math.abs(b.x-player.x)<16&&Math.abs(bsy-PLAYER_Y)<18){
      enemyBullets.splice(i,1);
      explode(player.x,PLAYER_Y,'#ff6600',20,false);
      loseLife(); return;
    }
  }

  /* enemies */
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const sy=PLAYER_Y-(e.wy-camY);
    if(e.type!=='fruit'&&sy>H+170){enemies.splice(i,1);continue;}

    /* bumpers: just tick bounceT, no collision handled here */
    if(e.type==='bumper'){if(e.bounceT>0)e.bounceT-=dt;continue;}

    /* type-specific movement/behavior */
    if(e.type==='heli'){
      e.rotor+=dt*32; e.x+=e.vx*dt;
      const rv=riverAt(e.wy);
      if(e.x<rv.l+28){e.x=rv.l+28;e.vx=Math.abs(e.vx);}
      if(e.x>rv.r-28){e.x=rv.r-28;e.vx=-Math.abs(e.vx);}
      if(sectorN>=activePreset.heliFireSect&&e.fireTimer!==Infinity){
        e.fireTimer-=dt;
        if(e.fireTimer<=0&&sy>30&&sy<H-60){
          e.fireTimer=Math.max(1.0,rnd(2.2,4.5)-sectorN*0.28);
          fireAtPlayer(e.x,e.wy,'#ff00ff',210+sectorN*28,0.18);
        }
      }
    } else if(e.type==='ship'){
      e.x+=e.vx*dt;
      const rv=riverAt(e.wy);
      if(e.x<rv.l+36){e.x=rv.l+36;e.vx=Math.abs(e.vx);}
      if(e.x>rv.r-36){e.x=rv.r-36;e.vx=-Math.abs(e.vx);}
    } else if(e.type==='jet'){
      e.x+=e.vx*dt;
      e.wy+=player.speed*dt;  // keep fixed screen height
      if(e.x<-90||e.x>W+90){enemies.splice(i,1);continue;}
    } else if(e.type==='fruit'){
      e.x+=e.vx*dt; e.spin+=dt*5;
      e.wy+=player.speed*dt;  // keep fixed screen height
      if(e.x<-90||e.x>W+90){enemies.splice(i,1);continue;}
    } else if(e.type==='tanker'){
      if(e.hit>0) e.hit-=dt;
      e.fireTimer-=dt;
      if(e.fireTimer<=0&&sy>20&&sy<H-40){
        const fireRate=Math.max(0.9,3.5-sectorN*0.35);
        e.fireTimer=rnd(fireRate*0.6,fireRate*1.5);
        fireAtPlayer(e.x,e.wy,'#ff4400',200+sectorN*38,0.22);
        SFX.tankerShot();
      }
    } else if(e.type==='bridge'){
      if(e.hit>0) e.hit-=dt;
    }

    if(sy<-200) continue;

    /* bullet hits */
    let destroyed=false;
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      let hit=false;
      if(e.type==='bridge')      hit=Math.abs(b.sy-sy)<18;
      else if(e.type==='fruit')  hit=Math.abs(b.x-e.x)<22&&Math.abs(b.sy-sy)<22;
      else                       hit=Math.abs(b.x-e.x)<e.w/2+b.r&&Math.abs(b.sy-sy)<e.h/2+b.r+5;
      if(!hit) continue;
      bullets.splice(j,1);
      if(e.type==='bridge'){
        enemies.splice(i,1); destroyed=true;
        SFX.sectorFanfare(); SFX.bigBoom();
        for(let t=0;t<4;t++) setTimeout(()=>{explode(rnd(80,W-80),sy+rnd(-22,22),'#ffe000',40,true);},t*110);
        addScore(500,W/2,sy-30,'#ffe000');
        sectorN++;
        fuel=Math.min(100,fuel+42);
        invuln=Math.max(invuln,1.8);
        banner={txt:'SECTOR '+(sectorN-1)+' CLEARED!   +500   ★ FUEL BONUS',t:0,life:2.6};
      } else if(e.type==='tanker'){
        e.hp--; e.hit=0.18;
        if(e.hp<=0){
          enemies.splice(i,1); destroyed=true;
          SFX.bigBoom();
          explode(e.x,sy,'#ff4400',32,true); explode(e.x,sy,'#ffaa00',16,false);
          addScore(e.val,e.x,sy-22,'#ff6600');
        } else {
          SFX.boom(); explode(e.x,sy,'#ff7722',14,false);
          popup(e.x,sy-18,'HIT! '+e.hp+'❤','#ff7722');
        }
      } else if(e.type==='fuel'){
        enemies.splice(i,1); destroyed=true;
        SFX.boom(); explode(e.x,sy,'#ffe000',28,true);
        addScore(80,e.x,sy-18,'#ffe000');
      } else if(e.type==='godFuel'){
        enemies.splice(i,1); destroyed=true;
        godMode=3.5; invuln=Math.max(invuln,3.5);
        SFX.godModeStart();
        explode(e.x,sy,'#ffffff',44,true); explode(e.x,sy,'#8800ff',22,false);
        addScore(300,e.x,sy-28,'#cc88ff');
        banner={txt:'⚡ GOD MODE ACTIVATED ⚡',t:0,life:2.4};
      } else if(e.type==='fruit'){
        enemies.splice(i,1); destroyed=true;
        SFX.fruitPop(); explode(e.x,sy,e.fd.col,22,false);
        addScore(e.fd.pts,e.x,sy-28,e.fd.col);
        popup(e.x,sy-50,e.fd.label,'#ffffff');
      } else if(e.type==='heli'){
        enemies.splice(i,1); destroyed=true;
        SFX.boom(); explode(e.x,sy,'#ff00ff',26,false);
        addScore(60,e.x,sy-18,'#ff00ff');
      } else if(e.type==='ship'){
        enemies.splice(i,1); destroyed=true;
        SFX.boom(); explode(e.x,sy,'#ff6600',24,false);
        addScore(30,e.x,sy-18,'#ff6600');
      } else if(e.type==='jet'){
        enemies.splice(i,1); destroyed=true;
        SFX.bigBoom(); explode(e.x,sy,'#aaff22',28,true);
        addScore(100,e.x,sy-18,'#aaff22');
      }
      break;
    }
    if(destroyed) continue;

    /* player collision */
    if(invuln>0) continue;
    if(e.type==='fuel'){
      if(Math.abs(player.x-e.x)<(e.w+player.w)/2&&Math.abs(PLAYER_Y-sy)<(e.h+player.h)/2){
        if(fuel<100){fuel=Math.min(100,fuel+dt*32); if(Math.random()<dt*10) SFX.fuelTick();}
      }
      continue;
    }
    if(e.type==='bridge'){ if(Math.abs(PLAYER_Y-sy)<15+player.h/2){loseLife();return;} continue; }
    if(e.type==='tanker'||e.type==='fruit') continue;
    if(e.type==='godFuel'){
      if(Math.abs(player.x-e.x)<(e.w+player.w)/2&&Math.abs(PLAYER_Y-sy)<(e.h+player.h)/2){
        enemies.splice(i,1);
        godMode=3.5; invuln=Math.max(invuln,3.5);
        SFX.godModeStart();
        explode(e.x,sy,'#ffffff',36,true); explode(e.x,sy,'#8800ff',18,false);
        banner={txt:'⚡ GOD MODE — 3 SECONDS! ⚡',t:0,life:2.4};
        popup(e.x,sy-42,'⚡ GOD MODE!','#ee99ff');
      }
      continue;
    }
    if(Math.abs(player.x-e.x)<(e.w+player.w)/2-5&&Math.abs(PLAYER_Y-sy)<(e.h+player.h)/2-2){
      enemies.splice(i,1); explode(e.x,sy,'#ff6600',24); loseLife(); return;
    }
  }

  /* bumper bounce — before bankCrash so a bumper saves you */
  if(invuln<=0){
    for(const e of enemies){
      if(e.type!=='bumper') continue;
      const bsy=PLAYER_Y-(e.wy-camY);
      if(Math.abs(bsy-PLAYER_Y)>30) continue;
      if(Math.abs(player.x-e.x)<e.r+16){
        player.vx=(e.side==='left'?1:-1)*500;
        const bRv=riverAt(e.wy);
        if(e.side==='left') player.x=Math.max(player.x,bRv.l+24);
        else                player.x=Math.min(player.x,bRv.r-24);
        if(e.bounceT<=0) SFX.bumperPop();
        e.bounceT=0.45; shake=Math.min(shake+3,7);
        break;
      }
    }
  }
  /* bank crash */
  if(invuln<=0&&bankCrash()){loseLife();return;}
  invuln-=dt;
  updateFx(dt);
}

function fireAtPlayer(ex,ewy,col,spd,inaccuracy){
  const dx=player.x-ex;
  const dwy=camY-ewy;
  const dist=Math.max(1,Math.sqrt(dx*dx+dwy*dwy));
  enemyBullets.push({
    x:ex,wy:ewy,
    vx:(dx/dist+(Math.random()-.5)*inaccuracy*2)*spd,
    vwy:dwy/dist*spd,
    r:4,col
  });
}

function bankCrash(){
  for(let oy=-16;oy<=18;oy+=10){
    const rv=riverAt(camY-oy);
    const half=oy<0?9:15;
    if(player.x-half<rv.l+2||player.x+half>rv.r-2) return true;
  }
  return false;
}

function updateFx(dt){
  const scroll=state===ST.PLAYING?player.speed:65;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.t+=dt;
    if(p.t>=p.life){particles.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=55*dt; p.y+=scroll*dt*0.4;
  }
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i]; r.t+=dt; r.r+=r.vr*dt;
    if(r.t>=r.life) rings.splice(i,1);
  }
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i]; p.t+=dt; p.y-=40*dt;
    if(p.t>=p.life) popups.splice(i,1);
  }
  if(banner){banner.t+=dt; if(banner.t>banner.life) banner=null;}
  if(shake>0) shake=Math.max(0,shake-dt*30);
}

/* ── render ── */
function riverRows(){
  const out=[];
  for(let sy=-24;sy<=H+24;sy+=8)
    out.push({sy,...riverAt(camY+(PLAYER_Y-sy))});
  return out;
}

function draw(){
  ctx.save();
  if(shake>0) ctx.translate(rnd(-shake,shake)*.55,rnd(-shake,shake)*.55);

  /* water */
  const gw=ctx.createLinearGradient(0,0,0,H);
  gw.addColorStop(0,'#040d2a'); gw.addColorStop(0.5,'#071840'); gw.addColorStop(1,'#0a2255');
  ctx.fillStyle=gw; ctx.fillRect(-10,-10,W+20,H+20);

  /* shimmer */
  ctx.strokeStyle='rgba(80,160,255,0.07)'; ctx.lineWidth=2;
  const woff=camY%52;
  for(let y=-52;y<H+52;y+=52){
    const yy=y+woff; ctx.beginPath(); ctx.moveTo(0,yy);
    for(let x=0;x<=W;x+=28) ctx.lineTo(x,yy+Math.sin((x+camY)*0.019)*3.5);
    ctx.stroke();
  }

  /* banks */
  const R=riverRows();
  ctx.fillStyle='#0c0525';
  ctx.beginPath(); ctx.moveTo(-10,-24);
  for(const r of R) ctx.lineTo(r.l,r.sy);
  ctx.lineTo(-10,H+24); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(W+10,-24);
  for(const r of R) ctx.lineTo(r.r,r.sy);
  ctx.lineTo(W+10,H+24); ctx.closePath(); ctx.fill();

  /* grid on banks */
  ctx.save();
  ctx.beginPath(); ctx.moveTo(-10,-24);
  for(const r of R) ctx.lineTo(r.l,r.sy);
  ctx.lineTo(-10,H+24); ctx.closePath();
  ctx.moveTo(W+10,-24);
  for(const r of R) ctx.lineTo(r.r,r.sy);
  ctx.lineTo(W+10,H+24); ctx.closePath();
  ctx.clip();
  ctx.strokeStyle='rgba(155,0,255,0.30)'; ctx.lineWidth=1;
  for(let y=-64;y<H+64;y+=36){ const yy=y+(camY%36); ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke(); }
  for(let x=0;x<=W;x+=36){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  ctx.restore();

  /* glowing bank edges */
  ctx.save();
  ctx.shadowColor='#00ffff'; ctx.shadowBlur=22; ctx.strokeStyle='#00ffff'; ctx.lineWidth=3;
  ctx.beginPath(); for(let i=0;i<R.length;i++) i?ctx.lineTo(R[i].l,R[i].sy):ctx.moveTo(R[i].l,R[i].sy); ctx.stroke();
  ctx.beginPath(); for(let i=0;i<R.length;i++) i?ctx.lineTo(R[i].r,R[i].sy):ctx.moveTo(R[i].r,R[i].sy); ctx.stroke();
  ctx.restore();

  /* entities */
  const dl=enemies.map(e=>({e,sy:PLAYER_Y-(e.wy-camY)})).sort((a,b)=>a.sy-b.sy);
  for(const {e,sy} of dl){
    if(sy<-130||sy>H+130) continue;
    if(e.type==='fuel')   drawFuel(e.x,sy);
    else if(e.type==='heli')   drawHeli(e,sy);
    else if(e.type==='ship')   drawShip(e,sy);
    else if(e.type==='jet')    drawJet(e,sy);
    else if(e.type==='tanker') drawTanker(e,sy);
    else if(e.type==='fruit')  drawFruit(e,sy);
    else if(e.type==='bridge')   drawBridge(sy,e);
    else if(e.type==='godFuel')  drawGodFuel(e.x,sy);
    else if(e.type==='bumper')   drawBumper(e,sy);
  }

  /* player bullets */
  ctx.save();
  ctx.shadowColor='#88ffff'; ctx.shadowBlur=16; ctx.fillStyle='#efffff';
  for(const b of bullets){ ctx.beginPath(); ctx.ellipse(b.x,b.sy,2.8,8,0,0,7); ctx.fill(); }
  ctx.restore();

  /* enemy bullets */
  ctx.save();
  for(const b of enemyBullets){
    const bsy=PLAYER_Y-(b.wy-camY);
    if(bsy<-40||bsy>H+40) continue;
    ctx.shadowColor=b.col; ctx.shadowBlur=16; ctx.fillStyle=b.col;
    ctx.beginPath(); ctx.arc(b.x,bsy,b.r,0,7); ctx.fill();
    ctx.globalAlpha=0.4;
    ctx.beginPath(); ctx.arc(b.x-b.vx*0.035,bsy-b.vwy*0.035,b.r*0.7,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();

  /* player */
  if(state===ST.PLAYING&&(invuln<=0||Math.floor(titleT*16)%2===0))
    drawPlayer(player.x,PLAYER_Y,player.vx,player.speed);

  /* rings */
  for(const r of rings){
    const a=1-r.t/r.life;
    ctx.strokeStyle=r.col; ctx.globalAlpha=a*.85; ctx.lineWidth=2.5*a+.5;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.stroke();
  }
  ctx.globalAlpha=1;

  /* particles */
  for(const p of particles){
    const a=1-p.t/p.life; ctx.globalAlpha=a;
    ctx.fillStyle=p.col; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  /* popups */
  ctx.textAlign='center';
  for(const p of popups){
    const a=1-p.t/p.life; ctx.globalAlpha=a;
    ctx.font='bold 16px "Courier New",monospace';
    ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=12;
    ctx.fillText(p.txt,p.x,p.y); ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  if(state===ST.PLAYING||state===ST.DYING) drawHUD();
  if(banner) drawBanner();
  if(state===ST.TITLE)    drawTitle();
  if(state===ST.SELECT)   drawDiffSelect();
  if(state===ST.GAMEOVER) drawGameOver();
  if(paused&&state===ST.PLAYING) drawPaused();

  /* scanlines */
  ctx.globalAlpha=0.045; ctx.fillStyle='#000';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1.5);
  ctx.globalAlpha=1;
  ctx.restore();
}

/* ── sprite draw ── */
function drawPlayer(x,y,vx,spd){
  const tilt=Math.max(-.32,Math.min(.32,vx/1100));
  ctx.save(); ctx.translate(x,y); ctx.rotate(tilt);
  const isGod=godMode>0;
  const gh=(titleT*300)%360;  // rotating rainbow hue
  const bodyCol=isGod?`hsl(${(gh+180)%360},100%,82%)`:'#e8ffff';
  const glowCol=isGod?`hsl(${gh},100%,65%)`:'#00ffff';
  const flameCol=isGod?`hsl(${(gh+60)%360},100%,65%)`:'#ff00ff';

  /* god mode aura ring */
  if(isGod){
    const pulse=0.5+0.5*Math.sin(titleT*14);
    ctx.shadowColor=`hsl(${gh},100%,65%)`; ctx.shadowBlur=50;
    ctx.strokeStyle=`hsl(${gh},100%,65%)`; ctx.lineWidth=3;
    ctx.globalAlpha=0.55*pulse;
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.3*pulse;
    ctx.beginPath(); ctx.arc(0,0,38,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }

  const fl=12+Math.sin(titleT*44)*5+(spd-120)/24;
  ctx.save();
  const fg=ctx.createLinearGradient(0,16,0,16+fl);
  fg.addColorStop(0,flameCol); fg.addColorStop(1,isGod?`hsla(${(gh+60)%360},100%,65%,0)`:'rgba(255,80,255,0)');
  ctx.shadowColor=flameCol; ctx.shadowBlur=isGod?34:24; ctx.fillStyle=fg;
  ctx.beginPath(); ctx.moveTo(-6,16); ctx.lineTo(0,16+fl); ctx.lineTo(6,16); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.shadowColor=glowCol; ctx.shadowBlur=isGod?34:24; ctx.fillStyle=bodyCol;
  ctx.beginPath();
  ctx.moveTo(0,-22); ctx.lineTo(7,-4); ctx.lineTo(18,10); ctx.lineTo(18,15);
  ctx.lineTo(6,12); ctx.lineTo(5,18); ctx.lineTo(-5,18); ctx.lineTo(-6,12);
  ctx.lineTo(-18,15); ctx.lineTo(-18,10); ctx.lineTo(-7,-4);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle=isGod?`hsl(${(gh+120)%360},100%,70%)`:'#00ffff';
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(3.5,-2); ctx.lineTo(-3.5,-2); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=isGod?`hsl(${(gh+240)%360},100%,65%,0.7)`:'rgba(0,255,255,0.6)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(6,8); ctx.lineTo(16,13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6,8); ctx.lineTo(-16,13); ctx.stroke();
  ctx.restore();
}

function drawGodFuel(x,sy){
  ctx.save(); ctx.translate(x,sy);
  const ph=(titleT*200)%360;
  ctx.shadowColor=`hsl(${ph},100%,65%)`; ctx.shadowBlur=32;
  ctx.fillStyle='#0a0018'; ctx.strokeStyle=`hsl(${ph},100%,65%)`; ctx.lineWidth=3;
  roundRect(-16,-29,32,58,9); ctx.fill(); ctx.stroke();
  ctx.shadowBlur=16; ctx.fillStyle=`hsl(${(ph+120)%360},100%,75%)`;
  ctx.font='bold 11px "Courier New"'; ctx.textAlign='center';
  'GOD'.split('').forEach((ch,i)=>ctx.fillText(ch,0,-16+i*13));
  ctx.fillStyle=`hsl(${(ph+240)%360},100%,75%)`;
  ctx.fillText('⚡',0,22);
  // corona sparkles
  for(let s=0;s<6;s++){
    const a=(s/6)*Math.PI*2+titleT*3;
    const sr=20+Math.sin(titleT*8+s)*5;
    ctx.globalAlpha=0.6;
    ctx.fillStyle=`hsl(${(ph+s*60)%360},100%,75%)`;
    ctx.beginPath(); ctx.arc(Math.cos(a)*sr,Math.sin(a)*sr,2.5,0,7); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawBumper(e,sy){
  ctx.save(); ctx.translate(e.x,sy);
  const bounce=e.bounceT>0;
  const extra=bounce?(Math.sin(e.bounceT/0.45*Math.PI)*6):0;
  const r=e.r+extra;
  ctx.shadowColor='#ff9900'; ctx.shadowBlur=bounce?32:14;
  // semicircle pointing into the river
  ctx.fillStyle='#331100';
  ctx.beginPath();
  if(e.side==='left'){
    ctx.arc(0,0,r,-Math.PI/2,Math.PI/2,false); // right-facing D shape
  } else {
    ctx.arc(0,0,r,Math.PI/2,3*Math.PI/2,false); // left-facing D shape
  }
  ctx.closePath(); ctx.fill();
  // bright rim
  ctx.strokeStyle=bounce?'#ffee00':'#ffaa00'; ctx.lineWidth=2.5;
  ctx.beginPath();
  if(e.side==='left'){
    ctx.arc(0,0,r,-Math.PI/2,Math.PI/2,false);
  } else {
    ctx.arc(0,0,r,Math.PI/2,3*Math.PI/2,false);
  }
  ctx.stroke();
  // center bolt
  ctx.shadowColor='#ffcc00'; ctx.shadowBlur=bounce?18:8;
  ctx.fillStyle=bounce?'#ffee00':'#ff9900';
  const bx=e.side==='left'?r*0.45:-r*0.45;
  ctx.beginPath(); ctx.arc(bx,0,r*0.32,0,7); ctx.fill();
  ctx.restore();
}

  ctx.fillRect(-28,-3.5,18,7);
  ctx.fillRect(-36,-6,10,4);
  ctx.shadowBlur=0; ctx.fillStyle='#ffccff';
  ctx.beginPath(); ctx.ellipse(6,-1,6,5,0,0,7); ctx.fill();

  ctx.strokeStyle='rgba(255,180,255,0.9)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(-22,-10); ctx.lineTo(22,-10); ctx.stroke();

  ctx.fillStyle='#fff'; ctx.fillRect(-2,-13,4,6);

}

function drawShip(e,sy){

  ctx.shadowBlur=0; ctx.fillStyle='#ffcc88';

function drawJet(e,sy){
  ctx.save(); ctx.translate(e.x,sy);

  ctx.shadowColor='#aaff00'; ctx.shadowBlur=20; ctx.fillStyle='#aaff00';

  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(-16,0,4,0,7); ctx.fill();

function drawTanker(e,sy){
  ctx.save(); ctx.translate(e.x,sy);
  if(e.side==='right') ctx.scale(-1,1);
  if(e.hit>0) ctx.translate(rnd(-2,2),0);
  ctx.fillStyle='#111'; ctx.fillRect(-27,9,54,10);
  ctx.strokeStyle='#444'; ctx.lineWidth=1;
  for(let tx=-24;tx<26;tx+=7){ ctx.beginPath(); ctx.moveTo(tx,9); ctx.lineTo(tx,19); ctx.stroke(); }
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=22; ctx.fillStyle='#2a0d00';
  ctx.fillRect(-27,-13,54,23);
  ctx.fillStyle='#7a2200';
  [[-22,-11,12,21],[-5,-11,12,21],[11,-11,12,21]].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));
  ctx.shadowBlur=26; ctx.fillStyle='#ff4400';

function drawFuel(x,sy){

function drawBridge(sy,e){

/* ── HUD ── */
function drawHUD(){
  ctx.save();
  // score
  ctx.textAlign='left'; ctx.font='bold 22px "Courier New",monospace';
  ctx.fillStyle='#efffff'; ctx.shadowColor='#00ffff'; ctx.shadowBlur=14;
  ctx.fillText(String(score).padStart(7,'0'),16,30);
  ctx.font='12px "Courier New"'; ctx.fillStyle='#66ccff';
  ctx.fillText('HI '+String(Math.max(hiScore(),score)).padStart(7,'0'),16,48);
  ctx.shadowBlur=0;
  // sector
  ctx.textAlign='right'; ctx.font='bold 15px "Courier New"';
  ctx.fillStyle='#ff44ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=12;
  ctx.fillText('SECTOR '+sectorN,W-16,30); ctx.shadowBlur=0;
  // wave indicator
  const wi=waveIntensity();
  ctx.font='11px "Courier New"'; ctx.fillStyle='hsl('+(120-wi*120)+',100%,65%)';
  ctx.textAlign='right';
  ctx.fillText(wi>0.75?'★ INTENSE':'FLYING',W-16,48);
  // lives
  for(let i=0;i<lives;i++){
    ctx.save(); ctx.translate(W-22-i*20,62); ctx.scale(0.44,0.44);
    ctx.shadowColor='#00ffff'; ctx.shadowBlur=8; ctx.fillStyle='#e8ffff';
    ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(7,-4); ctx.lineTo(16,9); ctx.lineTo(16,14);
    ctx.lineTo(5,11); ctx.lineTo(4,18); ctx.lineTo(-4,18); ctx.lineTo(-5,11);
    ctx.lineTo(-16,14); ctx.lineTo(-16,9); ctx.lineTo(-7,-4); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // fuel bar
  const bw=220,bx=(W-bw)/2,by=H-32;
  ctx.fillStyle='rgba(0,0,0,.5)'; roundRect(bx-4,by-4,bw+8,18,8); ctx.fill();
  const fr=fuel/100;
  const fc=fr>0.5?'#00ff88':fr>0.25?'#ffe000':'#ff2244';
  ctx.shadowColor=fc; ctx.shadowBlur=16; ctx.fillStyle=fc;
  if(fr>0.005){ roundRect(bx,by,Math.max(8,bw*fr),10,5); ctx.fill(); }
  ctx.shadowBlur=0; ctx.textAlign='center'; ctx.font='bold 11px "Courier New"';
  ctx.fillStyle='#cceeff'; ctx.fillText('⛽ FUEL',W/2,by-9);
  if(fr<=0.25&&Math.floor(titleT*5)%2===0){
    ctx.fillStyle='#ff2244'; ctx.shadowColor='#ff2244'; ctx.shadowBlur=12;
    ctx.fillText('▲ LOW FUEL — FLY OVER DEPOT ▲',W/2,by-24); ctx.shadowBlur=0;
  }
  // god mode indicator
  if(godMode>0){
    const gh=(titleT*300)%360;
    const flash=Math.floor(titleT*8)%2===0||godMode>0.8;
    if(flash){
      ctx.textAlign='center'; ctx.font='bold 18px "Courier New"';
      ctx.fillStyle=`hsl(${gh},100%,75%)`; ctx.shadowColor=`hsl(${gh},100%,65%)`; ctx.shadowBlur=20;
      ctx.fillText('⚡ GOD MODE ⚡  '+Math.ceil(godMode)+'s',W/2,H-62);
    }
    ctx.shadowBlur=0;
  }
  // version + mode badge
  ctx.textAlign='left'; ctx.font='11px "Courier New"';
  ctx.fillStyle=activePreset.col+'99';
  ctx.fillText('NEON RAID '+VERSION+'  ['+activePreset.label+']',10,H-10);
  ctx.restore();
}

function drawBanner(){
  const progress=banner.t/banner.life;
  const a=progress<0.15?progress/0.15:progress>0.8?(1-progress)/0.2:1;
  ctx.save(); ctx.globalAlpha=Math.max(0,a);
  ctx.textAlign='center'; ctx.font='bold 24px "Courier New",monospace';
  ctx.fillStyle='#ffe000'; ctx.shadowColor='#ffe000'; ctx.shadowBlur=22;
  ctx.fillText(banner.txt,W/2,H*.37); ctx.restore();
}

function neonText(txt,x,y,size,col,blur=20){
  ctx.font='bold '+size+'px "Courier New",monospace';
  ctx.textAlign='center';
  ctx.shadowColor=col; ctx.shadowBlur=blur; ctx.fillStyle=col;
  ctx.fillText(txt,x,y);
  ctx.shadowBlur=blur*1.8; ctx.fillText(txt,x,y);
  ctx.shadowBlur=0;
}

/* ── difficulty select screen ── */
function drawDiffSelect(){
  ctx.save();
  ctx.fillStyle='rgba(3,1,14,.80)'; ctx.fillRect(0,0,W,H);

  neonText('CHOOSE YOUR MISSION',W/2,110,30,'#00ffff',22);
  neonText('press  1 · 2 · 3  or tap a card',W/2,148,14,'#88aacc',7);

  const cardW=194, cardH=330, gap=16;
  const startX=(W-(cardW*3+gap*2))/2;

  DIFF_PRESETS.forEach((p,i)=>{
    const cx=startX+i*(cardW+gap);
    const cy=190;
    const hover=false; // no hover state needed on canvas

    // card bg
    ctx.save();
    ctx.shadowColor=p.col; ctx.shadowBlur=28;
    ctx.fillStyle='rgba(8,4,28,.92)';
    roundRect(cx,cy,cardW,cardH,14); ctx.fill();
    ctx.strokeStyle=p.col; ctx.lineWidth=2.5;
    roundRect(cx,cy,cardW,cardH,14); ctx.stroke();
    ctx.restore();

    // inner gradient stripe at top
    const gt=ctx.createLinearGradient(cx,cy,cx,cy+60);
    gt.addColorStop(0,p.col+'55'); gt.addColorStop(1,'transparent');
    ctx.fillStyle=gt;
    roundRect(cx,cy,cardW,60,14); ctx.fill();

    const mx=cx+cardW/2;

    // key number
    ctx.save();
    ctx.shadowColor=p.col; ctx.shadowBlur=16;
    ctx.font='bold 20px "Courier New"'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('[ '+(i+1)+' ]',mx,cy+32);
    ctx.restore();

    // label
    ctx.save();
    ctx.shadowColor=p.col; ctx.shadowBlur=22;
    ctx.font='bold 36px "Courier New"'; ctx.textAlign='center';
    ctx.fillStyle=p.col;
    ctx.fillText(p.label,mx,cy+100);
    ctx.restore();

    // sub
    ctx.font='italic 13px "Courier New"'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillText(p.sub,mx,cy+124);

    // divider
    ctx.strokeStyle=p.col+'66'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx+18,cy+140); ctx.lineTo(cx+cardW-18,cy+140); ctx.stroke();

    // stats
    const stats=[
      ['DIFFICULTY',  ['GENTLE','MODERATE','BRUTAL'][i]],
      ['ENEMIES',     ['SPARSE','BALANCED','DENSE'][i]],
      ['FUEL DRAIN',  ['SLOW','NORMAL','FAST'][i]],
      ['SCORE',       ['×1.0','×1.5','×2.0'][i]],
      ['TANKERS',     ['SECTOR '+p.tankerSect+'+','SECTOR '+p.tankerSect+'+','SECTOR 1'][i]],
    ];
    stats.forEach(([k,v],si)=>{
      const sy=cy+162+si*30;
      ctx.textAlign='left'; ctx.font='10px "Courier New"'; ctx.fillStyle='rgba(180,220,255,0.55)';
      ctx.fillText(k,cx+16,sy);
      ctx.textAlign='right'; ctx.font='bold 12px "Courier New"'; ctx.fillStyle=p.col;
      ctx.shadowColor=p.col; ctx.shadowBlur=6;
      ctx.fillText(v,cx+cardW-16,sy);
      ctx.shadowBlur=0;
    });

    // tip
    ctx.textAlign='center'; ctx.font='11px "Courier New"';
    ctx.fillStyle='rgba(255,255,255,0.38)';
    const tipWords=p.tip.split(' · ');
    tipWords.forEach((w,wi)=>ctx.fillText(w,mx,cy+cardH-38+wi*15));
  });

  // footer
  ctx.textAlign='center'; ctx.font='12px "Courier New"';
  ctx.fillStyle='rgba(100,180,255,0.45)';
  ctx.fillText('ESC to go back  ·  scores saved per mode',W/2,H-22);
  ctx.restore();
}

/* ── title ── */

    neonText('TAP OR PRESS ENTER TO CHOOSE MODE',W/2,460,19,'#ffe000',16);
  ctx.font='13px "Courier New"'; ctx.fillStyle='#aaddff'; ctx.textAlign='center';
  const ctrl=[
    '◄ ► / A D ............ steer',
    '▲ ▼ / W S ............ throttle',
    'SPACE / hold ......... fire',
    'fly over FUEL ........ refuel',
    '🍒🍊🍋🍓🍇🍉⭐  shoot fruits for bonus!',
    'TANKERS on banks ..... 1-4 hits to destroy',
    'destroy BRIDGES ...... clear sector + fuel',
    'M = mute  ·  P = pause  ·  L = legends',
    'R = restart  ·  Q = quit to title',
    '⚡ GOD FUEL (violet) ..... 3s invincibility!',
    '🛡 BUMPERS on bends ..... bounce instead of crash',
  ];
  ctrl.forEach((l,i)=>ctx.fillText(l,W/2,498+i*22));
  const topL=getTopLegend();
  if(topL){
    ctx.globalAlpha=0.8;
    ctx.shadowColor=topL.modeCol; ctx.shadowBlur=8;
    neonText('★ '+topL.name+'  ·  '+topL.score.toLocaleString()+'  ['+topL.modeLabel+']',W/2,688,13,'#ffe000',10);
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
  ctx.restore();
}

/* ── game over ── */
function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(3,1,14,.65)'; ctx.fillRect(0,0,W,H);
  neonText('MISSION OVER',W/2,258,48,'#ff2244',30);
  neonText('SCORE  '+score.toLocaleString(),W/2,328,30,'#efffff',14);
  neonText('SECTOR '+sectorN+'   MODE: '+activePreset.label,W/2,368,16,'#88ccff',8);
  if(score>=hiScore()&&score>0)
    neonText('★  NEW HIGH SCORE  ★',W/2,414,22,'#ffe000',20);
  if(!overlayOpen()&&Math.floor(titleT*1.8)%2===0)
    neonText('TAP OR PRESS ENTER TO CHOOSE MODE',W/2,472,16,'#00ff88',12);
  neonText('NEON RAID '+VERSION,W/2,H-20,12,'rgba(0,255,255,.45)',4);
  ctx.restore();
}

/* ── paused ── */
function drawPaused(){
  ctx.save();
  ctx.fillStyle='rgba(3,1,14,.65)'; ctx.fillRect(0,0,W,H);
  neonText('PAUSED',W/2,H/2,42,'#00ffff',24);
  neonText('press P to resume',W/2,H/2+42,16,'#88ccff',7);
  ctx.restore();
}

/* ── main loop ── */
(function init(){
  camY=220; spawnWy=camY; nextBridgeK=1;
  player=newPlayer();
  bullets=[]; enemies=[]; enemyBullets=[]; particles=[]; popups=[]; rings=[];
  fruitTimer=12; jetTimer=8;
  seedAhead();
  state=ST.TITLE;
})();

function frame(ts){
  const dt=Math.min(0.05,(ts-tPrev)/1000||0.016);
  tPrev=ts;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
